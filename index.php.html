<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Pendaftaran Mahasiswa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="stail.css">
</head>
<body style="background-color: #fff9e6; padding: 50px 0;">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8">

                <div id="cardData" style="display: none; margin-bottom: 20px;"></div>

                <div class="card shadow-sm" style="border-radius: 30px; border: none; padding: 25px; background: #fff;">
                    <div class="card-body">

                        <h2 class="text-center mb-4" style="color: #cca000; font-weight: bold;">Form Pendaftaran Mahasiswa</h2>

                        <form id="formMahasiswa" novalidate>

                            <div class="mb-4">
                                <label for="nim" class="form-label" style="font-weight: bold; color: #444;">NIM</label>
                                <input type="text" class="form-control" id="nim" name="nim" placeholder="Masukkan NIM Anda" style="border-radius: 15px; padding: 12px; border: 1.5px solid #ffd54f;">
                                <span class="text-danger" id="errorNim" style="display: block; margin-top: 5px;"></span>
                            </div>

                            <div class="mb-4">
                                <label for="nama" class="form-label" style="font-weight: bold; color: #444;">Nama Lengkap</label>
                                <input type="text" class="form-control" id="nama" name="nama" placeholder="Masukkan Nama Lengkap" style="border-radius: 15px; padding: 12px; border: 1.5px solid #ffd54f;">
                                <span class="text-danger" id="errorNama" style="display: block; margin-top: 5px;"></span>
                            </div>

                            <div class="mb-4">
                                <label for="email" class="form-label" style="font-weight: bold; color: #444;">Email Universitas</label>
                                <input type="email" class="form-control" id="email" name="email" placeholder="contoh@email.com" style="border-radius: 15px; padding: 12px; border: 1.5px solid #ffd54f;">
                                <span class="text-danger" id="errorEmail" style="display: block; margin-top: 5px;"></span>
                            </div>

                            <div class="mb-4">
                                <label for="hp" class="form-label" style="font-weight: bold; color: #444;">No. Handphone</label>
                                <input type="text" class="form-control" id="hp" name="hp" placeholder="Contoh: 08123456789" style="border-radius: 15px; padding: 12px; border: 1.5px solid #ffd54f;">
                                <span class="text-danger" id="errorHp" style="display: block; margin-top: 5px;"></span>
                            </div>

                            <div class="mb-4">
                                <label class="form-label d-block" style="font-weight: bold; color: #444;">Jenis Kelamin</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="jk" id="jk_l" value="Laki-laki">
                                    <label class="form-check-label" for="jk_l">Laki-laki</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="jk" id="jk_p" value="Perempuan">
                                    <label class="form-check-label" for="jk_p">Perempuan</label>
                                </div>
                                <span class="text-danger" id="errorJk" style="display: block; margin-top: 5px;"></span>
                            </div>

                            <div class="mb-4">
                                <label for="prodi" class="form-label" style="font-weight: bold; color: #444;">Program Studi</label>
                                <select class="form-select" id="prodi" name="prodi" style="border-radius: 15px; padding: 12px; border: 1.5px solid #ffd54f;">
                                    <option value="" disabled selected>-- Pilih Prodi --</option>
                                    <option value="Manajemen Informatika">Manajemen Informatika</option>
                                    <option value="Komputerisasi Akuntansi">Komputerisasi Akuntansi</option>
                                    <option value="Administrasi Bisnis">Administrasi Bisnis</option>
                                </select>
                                <span class="text-danger" id="errorProdi" style="display: block; margin-top: 5px;"></span>
                            </div>

                            <div class="mb-4">
                                <label for="alamat" class="form-label" style="font-weight: bold; color: #444;">Alamat</label>
                                <textarea class="form-control" id="alamat" name="alamat" rows="3" placeholder="Masukkan Alamat Lengkap" style="border-radius: 15px; padding: 12px; border: 1.5px solid #ffd54f;"></textarea>
                                <span class="text-danger" id="errorAlamat" style="display: block; margin-top: 5px;"></span>
                            </div>

                            <div class="mb-4">
                                <div class="d-flex align-items-center gap-3">
                                    <div class="flex-grow-1" style="border: 2px solid #ffd54f; padding: 25px 20px; border-radius: 20px; background-color: #fff;">
                                        <label for="foto" class="form-label" style="font-weight: bold; color: #444; font-size: 16px;">Pas Foto (JPG/PNG maksimal 2MB)</label>
                                        <input type="file" class="form-control" id="foto" name="foto" accept="image/*" style="border-radius: 10px;">
                                        <span class="text-danger" id="errorFoto" style="display: block; margin-top: 5px;"></span>
                                    </div>

                                    <div style="border: 2px dashed #ffd54f; width: 140px; height: 140px; min-width: 140px; border-radius: 20px; display: flex; align-items: center; justify-content: center; background: #fffde7; overflow: hidden;">
                                        <img id="previewFoto" src="" alt="Preview" style="width: 100%; height: 100%; object-fit: cover; border-radius: 15px; display: none;">
                                    </div>
                                </div>
                            </div>

                            <div id="hasil" class="mb-3 text-center"></div>

                            <div class="d-flex gap-3 mt-4">
                                <button type="submit" class="btn text-dark flex-grow-1" style="background-color: #ffd54f; font-weight: bold; padding: 15px; border-radius: 30px; border: none; font-size: 18px;">Daftar Sekarang</button>
                                <button type="reset" id="btnReset" class="btn text-dark flex-grow-1" style="background-color: #ffd54f; font-weight: bold; padding: 15px; border-radius: 30px; border: none; font-size: 18px;">Reset</button>
                            </div>

                        </form>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
